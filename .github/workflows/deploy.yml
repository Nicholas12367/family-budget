name: Deploy to Vercel (production)

# Deploys main to Vercel production on every push, so a merge actually goes
# live instead of only landing on GitHub.
#
# This is OFF until you turn it on, to avoid clashing with an existing Vercel
# Git integration (which would double-deploy). To enable:
#   1. Create a Vercel token: https://vercel.com/account/tokens
#   2. In this repo: Settings → Secrets and variables → Actions, add secrets
#      VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
#      (ORG_ID and PROJECT_ID come from `vercel link` / the project's
#       .vercel/project.json, or the Vercel project settings).
#   3. Add a repository VARIABLE named DEPLOY_ENABLED with value `true`
#      (Settings → Secrets and variables → Actions → Variables tab).
# If you already use Vercel's GitHub integration, do NOT set DEPLOY_ENABLED —
# leave this off so you don't deploy twice.
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy production
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      # Deploy the source and let Vercel build it server-side. This is the
      # reliable path: Vercel injects the project's Production environment
      # variables at build time, so NEXT_PUBLIC_* values (e.g. the Supabase
      # URL/anon key) get inlined correctly.
      #
      # Do NOT switch this to the `vercel build` + `vercel deploy --prebuilt`
      # flow: a prebuilt build on a clean CI machine has no .env.local, so the
      # NEXT_PUBLIC_* vars never get baked in and every SSR route 500s with
      # "Your project's URL and Key are required to create a Supabase client".
      # VERCEL_ORG_ID / VERCEL_PROJECT_ID (from secrets) link the project.
      - name: Deploy to production (Vercel builds with project env)
        run: vercel deploy --prod --yes --token="$VERCEL_TOKEN"
