name: Scan health watchdog

# Detects when real users are failing to scan receipts and opens a GitHub
# issue so it can be fixed immediately. Scheduled workflows only run from the
# repository's DEFAULT branch, so this activates once merged to main.
# Use the "Run workflow" button (workflow_dispatch) to test it before then.
on:
  schedule:
    - cron: "*/15 * * * *" # every 15 minutes
  workflow_dispatch:
    inputs:
      window_min:
        description: "Minutes of history to inspect"
        required: false
        default: "30"

permissions:
  contents: read
  issues: write

concurrency:
  group: scan-health
  cancel-in-progress: false

jobs:
  check:
    name: Check scan failure rate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run health check
        id: health
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCAN_HEALTH_WINDOW_MIN: ${{ github.event.inputs.window_min || '30' }}
        run: node scripts/scan-health-check.mjs

      - name: Open or update alert issue
        if: steps.health.outputs.alert == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('scan-health-report.md', 'utf8');
            const summary = process.env.SUMMARY || 'Receipt scan failures detected';
            const label = 'scan-health';

            // De-dupe: reuse an existing open watchdog issue instead of
            // spamming a new one every 15 minutes.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
              per_page: 1,
            });

            if (existing.data.length > 0) {
              const number = existing.data[0].number;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: number,
                body: `Still failing as of ${new Date().toISOString()}.\n\n${body}`,
              });
              core.info(`Updated existing issue #${number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🚨 Receipt scan failures — ${summary}`,
                body,
                labels: [label, 'claude'],
              });
              core.info(`Opened issue #${created.data.number}`);
            }
        env:
          SUMMARY: ${{ steps.health.outputs.summary }}
